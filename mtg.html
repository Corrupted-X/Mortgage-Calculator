<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Mortgage Payment Calculator</title>
    <link rel="stylesheet" href="mortgage.css">
    <script src="mortgage.js" async></script>
</head>
<body>
    <noscript>
        <p>Sorry, JavaScript is required for this page to work.</p>
    </noscript>

    <div class="center">
        <div class="titles">
            <h1>Mortgage Calculator</h1>
            <h2>How Much House can I afford?</h2>
        </div>

        <form name="mtgForm">
            <label for="price">Price of house: </label>
            <input type="text" id="price" name="price" maxlength="7" placeholder="0000000" required><br>

            <label for="downpayment">Down Payment (Exclude '%'): </label>
            <input type="text" id="downpayment" name="downpayment" maxlength="3" placeholder="0" required><br>

            <label for="term">Term of Loan: </label>
            <select id="term" name="term" size="1" required>
                <option value="" disabled selected> Select Year</option>
                <option>15</option>
                <option>20</option>
                <option>25</option>
                <option>30</option>
            </select>
            <br>

            <label for="rate">Rate: </label>
            <input type="range" id="rate" name="rate" min="1.00" max="15.00" step="0.05" value="1.00" onChange="slider('rate');" > 
            <span id="ratevalue">1.00%</span><br>

            <label for="amount">Payment Amount: </label>
            <input type="text" id="amount" value="" disabled>

            <br>

            <button type="button" class="submit" onClick="compute();">Calculate Payment</button>
            <button type="reset">Clear</button>
        </form> 
    </div>
